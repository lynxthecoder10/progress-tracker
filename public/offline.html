<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RankForge — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #09090b;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1.5rem;
      text-align: center;
      padding: 2rem;
    }
    .icon {
      width: 80px; height: 80px;
      border-radius: 24px;
      background: linear-gradient(135deg, #d97706, #ea580c);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem;
      box-shadow: 0 0 40px rgba(217,119,6,0.3);
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.05);} }
    h1 { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; }
    p  { color: #6b7280; font-size: 0.95rem; max-width: 320px; line-height: 1.6; }
    .badge {
      display: inline-block;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 9999px;
      padding: 0.4rem 1rem;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #f59e0b;
    }
    button {
      margin-top: 0.5rem;
      background: linear-gradient(135deg, #d97706, #ea580c);
      color: white;
      border: none;
      border-radius: 9999px;
      padding: 0.75rem 2rem;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      transition: transform 0.2s, opacity 0.2s;
    }
    button:hover { transform: scale(1.03); opacity: 0.9; }
  </style>
</head>
<body>
  <div class="icon">⚒️</div>
  <div class="badge">Offline Mode</div>
  <h1>The Forge is Unreachable</h1>
  <p>You're offline right now. Connect to the internet to forge your rank and continue your grind.</p>
  <button onclick="location.reload()">Try Again</button>
</body>
</html>
